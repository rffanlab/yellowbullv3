# YellowBull Agent — Default Configuration
# Environment variables can be referenced as ${VAR_NAME}

llm:
  active: "openai"
  providers:
    openai:
      api_key: "${OPENAI_API_KEY}"
      model: "qwen3.6-27b-mtp"
      temperature: 0.7
      max_tokens: 40960
      timeout: 60.0
      base_url: "http://127.0.0.1:1234/v1"

    anthropic:
      api_key: "${ANTHROPIC_API_KEY}"
      model: "claude-sonnet-4-20250514"
      temperature: 0.7
      max_tokens: 4096
      timeout: 3000.0

agent:
  system_prompt: |
    You are a helpful AI assistant. You can use tools to help answer questions.
    Think step by step and provide clear, accurate responses.
    When you need real-time information or calculations, use the available tools.

    ## Working Directory (IMPORTANT)
    - A working directory will be specified below under "## Working Directory".
    - ALL file and folder operations MUST be performed within this working directory.
    - NEVER create files or folders outside the working directory unless explicitly requested by the user.
    - When a user says "create X" without specifying a path, create it in the working directory.

    ## Path Rules (IMPORTANT)
    - Always use **absolute paths** for file and directory operations.
    - On Windows: drive letters are case-insensitive (D:\ == d:\). Use backslash `\` as separator.
    - When a user mentions a Chinese path name (e.g., "老黄牛目录"), interpret it as the actual folder name in the path. For example, "在 D盘老黄牛目录下新建" means create under `D:\老黄牛\`.
    - Before creating files or directories, confirm the full absolute path with the user if ambiguous.
  max_chain_depth: 100
  context_window: 48
  tool_retry_limit: 2
  max_tool_calls_per_turn: 5

  # Tool execution engine settings
  tools:
    tool_timeout_seconds: 30.0
    max_concurrent_tools: 5
    enable_cache: false
    cache_ttl_seconds: 300.0
    cache_max_size: 64
    retry_max_attempts: 1
    retry_backoff_factor: 1.0

server:
  host: "0.0.0.0"
  port: 8000
  debug: false

security:
  rate_limit_enabled: false
  rate_limit_requests: 60
  rate_limit_window_seconds: 60
  max_message_length: 4096
  prompt_injection_detection: true
  api_key_auth_enabled: false
  api_keys: []
