version: "3.9"

services:
  app:
    build: .
    ports:
      - "${AGENT_PORT:-8000}:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGENT_CONFIG=config/default.yaml
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://yellowbull:yellowbull@postgres:5432/yellowbull
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: yellowbull
      POSTGRES_USER: yellowbull
      POSTGRES_PASSWORD: yellowbull
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yellowbull"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
  postgres_data:
